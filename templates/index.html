<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121214">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>FoodTally</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <h1>🛒 FoodTally</h1>
        <div class="total-display">
            <span class="total-label">Total no Carrinho</span>
            <span id="total-geral" class="total-valor">R$ 0,00</span>
        </div>
    </header>

    <main class="app-lista">
        <ul id="lista-itens" class="lista-itens"></ul>
    </main>

    <footer class="app-controles">
        <div class="input-grupo">
            <input type="text" id="nome-item" placeholder="Nome do item (ex: Tomate)" autocomplete="off">
            
            <!-- NOVO CAMPO: Categorias -->
            <select id="categoria-item">
                <option value="🛒 Sem Categoria">🛒 Sem Categoria</option>
                <option value="🍎 Hortifrúti">🍎 Hortifrúti</option>
                <option value="🥩 Açougue & Frios">🥩 Açougue & Frios</option>
                <option value="🍚 Mercearia">🍚 Mercearia</option>
                <option value="🥤 Bebidas">🥤 Bebidas</option>
                <option value="🧼 Limpeza">🧼 Limpeza</option>
                <option value="🧴 Higiene">🧴 Higiene</option>
            </select>

            <div class="row-inputs">
                <select id="tipo-unidade">
                    <option value="un">Unidade Fixa (un)</option>
                    <option value="kg">Peso Exato (kg)</option>
                    <option value="estimar_un">Estimar Hortifruti</option>
                </select>
                <input type="number" id="qtd-item" placeholder="Qtd" min="0.1" step="0.01">
            </div>

            <input type="number" id="valor-item" placeholder="Preço Unitário ou por KG (R$)" step="0.01">
            <button id="btn-salvar" onclick="salvarItem()">Adicionar à Lista</button>
        </div>
    </footer>
</div>

<script src="{{ url_for('static', filename='js/pesos.js') }}"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
